<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RRHH Hospital</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.263.0/font/lucide.css" />
</head>
<body>
    <div class="app-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">🏥</div>
                <div>
                    <h1>RRHH Hospital</h1>
                    <span>Sistema de Gestión</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section-title">Principal</div>
                <a class="nav-item active" onclick="navigateTo('dashboard')">
                    <span class="nav-icon">📊</span> Dashboard
                </a>

                <div class="nav-section-title">Gestión</div>
                <a class="nav-item" onclick="navigateTo('empleados')">
                    <span class="nav-icon">👥</span> Empleados
                </a>
                <a class="nav-item" onclick="navigateTo('asignaciones')">
                    <span class="nav-icon">📋</span> Asignaciones
                </a>
                <a class="nav-item" onclick="navigateTo('contratos')">
                    <span class="nav-icon">📄</span> Contratos
                </a>
                <a class="nav-item" onclick="navigateTo('planillas')">
                    <span class="nav-icon">💰</span> Planillas
                </a>

                <div class="nav-section-title">Administración</div>
                <a class="nav-item" onclick="navigateTo('despidos')">
                    <span class="nav-icon">🚪</span> Despidos
                </a>
                <a class="nav-item" onclick="navigateTo('cargos')">
                    <span class="nav-icon">🏷️</span> Cargos
                </a>
                <a class="nav-item" onclick="navigateTo('departamentos')">
                    <span class="nav-icon">🏢</span> Departamentos
                </a>
                <a class="nav-item" onclick="navigateTo('turnos')">
                    <span class="nav-icon">🕐</span> Turnos
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">A</div>
                    <div>
                        <div style="font-weight:600;color:#fff">Administrador</div>
                        <div style="font-size:11px">RRHH</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- MAIN -->
        <div class="main-content">
            <header class="topbar">
                <div class="topbar-left">
                    <h2 id="page-title">Dashboard</h2>
                    <p id="page-subtitle">Resumen general del sistema</p>
                </div>
                <div class="topbar-right">
                    <span class="badge-pill" id="topbar-date"></span>
                </div>
            </header>

            <div class="page-content">

                <!-- DASHBOARD -->
                <div class="page active" id="page-dashboard"></div>

                <!-- EMPLEADOS -->
                <div class="page" id="page-empleados"></div>

                <!-- ASIGNACIONES -->
                <div class="page" id="page-asignaciones"></div>

                <!-- CONTRATOS -->
                <div class="page" id="page-contratos"></div>

                <!-- PLANILLAS -->
                <div class="page" id="page-planillas"></div>

                <!-- DESPIDOS -->
                <div class="page" id="page-despidos"></div>

                <!-- CARGOS -->
                <div class="page" id="page-cargos"></div>

                <!-- DEPARTAMENTOS -->
                <div class="page" id="page-departamentos"></div>

                <!-- TURNOS -->
                <div class="page" id="page-turnos"></div>

            </div>
        </div>
    </div>

    <!-- MODAL GLOBAL -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal-content"></div>
    </div>

    <!-- SCRIPTS -->
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/empleados.js"></script>
    <script src="js/asignaciones.js"></script>
    <script src="js/contratos.js"></script>
    <script src="js/planillas.js"></script>
    <script src="js/despidos.js"></script>
    <script src="js/cargos.js"></script>
    <script src="js/departamentos.js"></script>
    <script src="js/turnos.js"></script>

    <script>
  // Fecha en topbar
  document.getElementById('topbar-date').textContent =
    new Date().toLocaleDateString('es-BO', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

        // Navegación entre páginas
        const pages = {
            dashboard: { title: 'Dashboard', subtitle: 'Resumen general del sistema' },
            empleados: { title: 'Empleados', subtitle: 'Gestión del personal' },
            asignaciones: { title: 'Asignaciones', subtitle: 'Turnos y departamentos por empleado' },
            contratos: { title: 'Contratos', subtitle: 'Contratos del personal' },
            planillas: { title: 'Planillas', subtitle: 'Gestión de sueldos y descuentos' },
            despidos: { title: 'Despidos', subtitle: 'Registro de bajas del personal' },
            cargos: { title: 'Cargos', subtitle: 'Administración de cargos' },
            departamentos: { title: 'Departamentos', subtitle: 'Administración de departamentos' },
            turnos: { title: 'Turnos', subtitle: 'Administración de turnos' },
        };

        const paginasCargadas = new Set();

        function navigateTo(section) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`page-${section}`).classList.add('active');
            event.currentTarget.classList.add('active');
            document.getElementById('page-title').textContent = pages[section].title;
            document.getElementById('page-subtitle').textContent = pages[section].subtitle;

            if (!paginasCargadas.has(section)) {
                paginasCargadas.add(section);
                const loaders = {
                    dashboard: loadDashboard,
                    empleados: loadEmpleados,
                    asignaciones: loadAsignaciones,
                    contratos: loadContratos,
                    planillas: loadPlanillas,
                    despidos: loadDespidos,
                    cargos: loadCargos,
                    departamentos: loadDepartamentos,
                    turnos: loadTurnos,
                };
                if (loaders[section]) loaders[section]();
            }
        }

        // Modal helpers
        function openModal(html) {
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('modal-overlay').classList.add('open');
        }
        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('open');
        }
        document.getElementById('modal-overlay').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        // Carga inicial solo dashboard
        paginasCargadas.add('dashboard');
        loadDashboard();
    </script>
</body>
</html>
